<div class="wow animated fadeIn" data-wow-delay=".15s">
    <a href="{{ movie_url }}" class="project card text-dark">
      {% if movie_poster %}
      <img id="{{ movie_name }}-img" class="card-img-top" src="{{ movie_poster }}" alt="{{ movie_name }}" />
      {% endif %}
      <div class="card-body">
        <h5 id="{{ movie_name }}-name" class="card-title">
            <!-- {% if project_type == "remote" %}
            <i class="fab fa-github" data-toggle="tooltip" data-placement="bottom" data-delay="250" title="GitHub Repository"></i> |
            {% endif %} -->
          {{ movie_name }}
        </h5>
        <p id="{{ movie_name }}-desc" class="card-text">{{ movie_year }}</p>
        <p id="{{ movie_name }}-tools" class="card-text">
          <!-- {% for tool in project_tools %}
          <span class="badge badge-pill text-primary border border-primary">{{ tool }}</span>
          {% endfor %} -->
        </p>
      </div>
    </a>
  </div>
